services:
  db:
      image: mysql:8.0
      container_name: mysql_db
      restart: always
      command: --default-authentication-plugin=mysql_native_password
      environment:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: aplis
        MYSQL_USER: mysql
        MYSQL_PASSWORD: root
      ports:
        - 3306:3306
      volumes:
        - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
